<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Dashboard — An Evening to Remember</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --gold:#c9a84c; --gold-light:#e8c97a; --gold-dim:rgba(201,168,76,0.15);
    --black:#080808; --dark:#0d0d0d; --card:#141414;
    --border:rgba(201,168,76,0.22); --text:#e8e0d0; --muted:rgba(232,224,208,0.4);
    --green:#6fcf8a; --green-dim:rgba(111,207,138,0.12); --green-border:rgba(111,207,138,0.25);
  }
  body { font-family:'Montserrat',sans-serif; background:var(--black); color:var(--text); min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse 70% 40% at 100% 0%,rgba(201,168,76,0.06) 0%,transparent 55%),
                radial-gradient(ellipse 50% 30% at 0% 100%,rgba(201,168,76,0.04) 0%,transparent 50%);
    pointer-events:none; z-index:0;
  }
  @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes spin    { to{transform:rotate(360deg)} }
  @keyframes pulse   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  /* LOGIN */
  #login-screen { position:fixed; inset:0; background:var(--black); display:flex; align-items:center; justify-content:center; z-index:100; padding:24px; }
  #login-screen.hidden { display:none; }
  .login-box { background:var(--card); border:1px solid var(--border); border-radius:2px; padding:48px; width:100%; max-width:380px; text-align:center; animation:fadeUp 0.5s ease; }
  .login-icon { font-size:2rem; margin-bottom:20px; display:block; color:var(--gold); }
  .login-title { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; letter-spacing:0.04em; margin-bottom:6px; }
  .login-sub { font-size:9px; color:var(--muted); letter-spacing:0.25em; text-transform:uppercase; margin-bottom:32px; }
  .login-box input { width:100%; background:var(--dark); border:1px solid var(--border); border-radius:1px; padding:13px 16px; font-family:'Montserrat',sans-serif; font-size:13px; color:var(--text); outline:none; text-align:center; letter-spacing:0.2em; transition:border-color 0.2s; appearance:none; }
  .login-box input::placeholder { color:var(--muted); letter-spacing:0.1em; }
  .login-box input:focus { border-color:var(--gold); }
  .login-box input.invalid { border-color:rgba(220,80,80,0.5); }
  .login-btn { width:100%; padding:13px; background:var(--gold); color:var(--black); border:none; border-radius:1px; font-family:'Montserrat',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.35em; text-transform:uppercase; cursor:pointer; margin-top:14px; transition:background 0.2s,transform 0.2s; }
  .login-btn:hover { background:var(--gold-light); transform:translateY(-1px); }
  .login-error { font-size:10px; color:#e07070; letter-spacing:0.08em; margin-top:12px; min-height:16px; display:none; }
  .login-error.show { display:block; }

  /* DASHBOARD */
  #dashboard { position:relative; z-index:1; display:none; animation:fadeIn 0.4s ease; }
  #dashboard.visible { display:block; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:20px 32px; border-bottom:1px solid var(--border); background:rgba(20,20,20,0.95); backdrop-filter:blur(8px); position:sticky; top:0; z-index:10; gap:16px; flex-wrap:wrap; }
  .topbar-left { display:flex; align-items:center; gap:16px; }
  .topbar-badge { font-size:8px; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; color:var(--black); background:var(--gold); padding:4px 10px; border-radius:1px; }
  .topbar-title { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:300; letter-spacing:0.05em; }
  .topbar-right { display:flex; align-items:center; gap:16px; }
  .live-dot { display:flex; align-items:center; gap:8px; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--green); }
  .live-dot::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; animation:pulse 2s ease infinite; }
  .logout-btn { background:none; border:1px solid var(--border); color:var(--muted); font-size:8px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; padding:7px 14px; border-radius:1px; cursor:pointer; font-family:'Montserrat',sans-serif; transition:all 0.2s; }
  .logout-btn:hover { border-color:var(--gold); color:var(--gold); }

  .main { max-width:1200px; margin:0 auto; padding:36px 32px 60px; }

  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:32px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:2px; padding:20px 22px; position:relative; overflow:hidden; }
  .stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--gold),transparent); opacity:0.4; }
  .stat-num { font-family:'Cormorant Garamond',serif; font-size:2.8rem; font-weight:300; color:var(--gold); line-height:1; margin-bottom:6px; }
  .stat-label { font-size:8px; font-weight:600; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); }

  .controls { display:flex; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .search-wrap { position:relative; flex:1; min-width:200px; }
  .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; pointer-events:none; }
  .search-wrap input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:1px; padding:12px 14px 12px 42px; font-family:'Montserrat',sans-serif; font-size:12px; color:var(--text); outline:none; transition:border-color 0.2s; appearance:none; }
  .search-wrap input::placeholder { color:var(--muted); }
  .search-wrap input:focus { border-color:var(--gold); }
  .filter-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); font-size:9px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; padding:12px 18px; border-radius:1px; cursor:pointer; font-family:'Montserrat',sans-serif; transition:all 0.2s; white-space:nowrap; }
  .filter-btn:hover, .filter-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
  .refresh-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); font-size:16px; padding:12px 16px; border-radius:1px; cursor:pointer; transition:all 0.2s; line-height:1; }
  .refresh-btn:hover { border-color:var(--gold); color:var(--gold); }
  .refresh-btn.spinning { animation:spin 0.6s linear; }

  .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:2px; overflow:hidden; }
  .table-head { display:grid; grid-template-columns:48px 1fr 200px 80px 120px 110px; padding:13px 20px; border-bottom:1px solid var(--border); background:rgba(201,168,76,0.05); }
  .th { font-size:8px; font-weight:700; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); }
  .guest-row { display:grid; grid-template-columns:48px 1fr 200px 80px 120px 110px; padding:15px 20px; border-bottom:1px solid rgba(201,168,76,0.07); align-items:center; transition:background 0.15s; }
  .guest-row:last-child { border-bottom:none; }
  .guest-row:hover { background:rgba(201,168,76,0.03); }
  .guest-row.checked-in { background:rgba(111,207,138,0.03); }
  .row-num { font-size:11px; color:var(--muted); }
  .guest-name { font-size:14px; font-weight:400; letter-spacing:0.02em; }
  .guest-email { font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .guest-party { font-size:12px; color:var(--muted); }
  .guest-time { font-size:10px; color:var(--muted); letter-spacing:0.02em; line-height:1.6; }
  .checkin-btn { font-family:'Montserrat',sans-serif; font-size:8px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; padding:7px 12px; border-radius:1px; cursor:pointer; transition:all 0.2s; border:1px solid var(--border); background:none; color:var(--muted); width:90px; text-align:center; }
  .checkin-btn:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
  .checkin-btn.in { background:var(--green-dim); border-color:var(--green-border); color:var(--green); }

  .empty-state { text-align:center; padding:70px 20px; color:var(--muted); }
  .empty-icon { font-size:2.2rem; margin-bottom:14px; }
  .empty-state p { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; }

  .loading-state { text-align:center; padding:50px 20px; color:var(--muted); }
  .big-spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
  .loading-state p { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; }

  .table-footer { display:flex; align-items:center; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:12px; }
  .result-count { font-size:10px; color:var(--muted); letter-spacing:0.1em; }
  .last-refresh { font-size:10px; color:var(--muted); letter-spacing:0.08em; }
  .clear-btn { background:none; border:1px solid rgba(220,80,80,0.25); color:rgba(220,80,80,0.6); font-size:8px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; padding:8px 16px; border-radius:1px; cursor:pointer; font-family:'Montserrat',sans-serif; transition:all 0.2s; }
  .clear-btn:hover { border-color:rgba(220,80,80,0.6); color:rgba(220,80,80,0.9); }

  @media (max-width:900px) {
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .table-head, .guest-row { grid-template-columns:36px 1fr 90px 110px; }
    .th:nth-child(3),.th:nth-child(5),.guest-email,.guest-time { display:none; }
  }
  @media (max-width:560px) { .topbar { padding:14px 18px; } .main { padding:24px 18px 48px; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <span class="login-icon">⬡</span>
    <div class="login-title">Security Access</div>
    <div class="login-sub">Staff credentials required</div>
    <input type="password" id="pwd-input" placeholder="Enter passcode" maxlength="20"
      onkeydown="if(event.key==='Enter') tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Unlock Dashboard</button>
    <div class="login-error" id="login-error">Incorrect passcode. Please try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-badge">Security</span>
      <span class="topbar-title">Guest Registry</span>
    </div>
    <div class="topbar-right">
      <span class="live-dot">Live</span>
      <button class="logout-btn" onclick="logout()">Lock Screen</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Registered</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-checked">—</div><div class="stat-label">Checked In</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-pending">—</div><div class="stat-label">Awaiting</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-guests">—</div><div class="stat-label">Total Guests</div></div>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Search by name or email…" oninput="render()">
      </div>
      <button class="filter-btn active" id="filter-all"     onclick="setFilter('all')">All</button>
      <button class="filter-btn"        id="filter-pending" onclick="setFilter('pending')">Awaiting</button>
      <button class="filter-btn"        id="filter-in"      onclick="setFilter('in')">Checked In</button>
      <button class="refresh-btn" id="refresh-btn" onclick="fetchGuests()" title="Refresh">↻</button>
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <div class="th">#</div>
        <div class="th">Name</div>
        <div class="th">Email</div>
        <div class="th">Party</div>
        <div class="th">Registered</div>
        <div class="th">Status</div>
      </div>
      <div id="guest-list-body">
        <div class="loading-state"><div class="big-spinner"></div><p>Loading guests…</p></div>
      </div>
    </div>

    <div class="table-footer">
      <span class="result-count" id="result-count"></span>
      <span class="last-refresh" id="last-refresh"></span>
      <button class="clear-btn" onclick="clearAll()">Clear All Records</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlITBlVboF1t-HHvH8WngECIFg4qw_DY1aczXKKA1GNaIL5K6f6dMTWq-KoC2uboMl/exec';
  const PASSCODE = '1234'; // ← Change this to your desired passcode

  let guests = [];
  let filter = 'all';
  let refreshInterval;

  // ── AUTH ──
  function tryLogin() {
    const val = document.getElementById('pwd-input').value;
    const errEl = document.getElementById('login-error');
    const input = document.getElementById('pwd-input');
    if (val === PASSCODE) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.add('visible');
      fetchGuests();
      refreshInterval = setInterval(fetchGuests, 15000);
    } else {
      input.classList.add('invalid');
      errEl.classList.add('show');
      input.value = '';
      setTimeout(() => { input.classList.remove('invalid'); errEl.classList.remove('show'); }, 2500);
    }
  }

  function logout() {
    clearInterval(refreshInterval);
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('dashboard').classList.remove('visible');
    document.getElementById('pwd-input').value = '';
    guests = [];
  }

  // ── DATA ──
  async function fetchGuests() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    try {
      const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
      const data = await res.json();
      guests = Array.isArray(data) ? data : [];
      render();
      updateStats();
      document.getElementById('last-refresh').textContent =
        'Updated ' + new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    } catch(e) {
      document.getElementById('last-refresh').textContent = 'Failed to refresh — check connection';
    }
    setTimeout(() => btn.classList.remove('spinning'), 600);
  }

  async function toggleCheckIn(id) {
    const g = guests.find(g => String(g.ID) === String(id));
    if (!g) return;
    const newVal = !(g['Checked In'] === true || g['Checked In'] === 'TRUE' || g['Checked In'] === true);
    g['Checked In'] = newVal;
    render(); updateStats();

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'checkIn', id: String(id), checkedIn: newVal })
      });
      setTimeout(fetchGuests, 1500);
    } catch(e) { console.error('Check-in sync failed', e); }
  }

  function setFilter(f) {
    filter = f;
    ['all','pending','in'].forEach(k =>
      document.getElementById('filter-' + k).classList.toggle('active', k === f)
    );
    render();
  }

  function updateStats() {
    const checked = guests.filter(g => g['Checked In'] === true || g['Checked In'] === 'TRUE').length;
    const totalGuests = guests.reduce((s, g) => s + (parseInt(g['Party Size']) || 1), 0);
    document.getElementById('stat-total').textContent   = guests.length;
    document.getElementById('stat-checked').textContent = checked;
    document.getElementById('stat-pending').textContent = guests.length - checked;
    document.getElementById('stat-guests').textContent  = totalGuests;
  }

  function render() {
    const q = (document.getElementById('search-input')?.value || '').toLowerCase();
    const filtered = guests.filter(g => {
      const name  = (g.Name  || '').toLowerCase();
      const email = (g.Email || '').toLowerCase();
      const matchQ = !q || name.includes(q) || email.includes(q);
      const isIn   = g['Checked In'] === true || g['Checked In'] === 'TRUE';
      const matchF = filter === 'all' || (filter === 'in' && isIn) || (filter === 'pending' && !isIn);
      return matchQ && matchF;
    });

    document.getElementById('result-count').textContent = filtered.length === 0 ? '' :
      `Showing ${filtered.length} of ${guests.length} registration${guests.length !== 1 ? 's' : ''}`;

    const body = document.getElementById('guest-list-body');

    if (guests.length === 0) {
      body.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><p>No registrations yet</p></div>`;
      return;
    }

    if (filtered.length === 0) {
      body.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><p>No results match your search</p></div>`;
      return;
    }

    body.innerHTML = filtered.map((g, i) => {
      const isIn = g['Checked In'] === true || g['Checked In'] === 'TRUE';
      const party = parseInt(g['Party Size']) || 1;
      const regAt = g['Registered At'] || '—';
      return `
        <div class="guest-row ${isIn ? 'checked-in' : ''}">
          <span class="row-num">${i + 1}</span>
          <span class="guest-name">${escHtml(g.Name || '—')}</span>
          <span class="guest-email">${escHtml(g.Email || '—')}</span>
          <span class="guest-party">${party > 1 ? `${party} ppl` : 'Solo'}</span>
          <span class="guest-time">${escHtml(regAt)}</span>
          <button class="checkin-btn ${isIn ? 'in' : ''}" onclick="toggleCheckIn('${g.ID}')">
            ${isIn ? '✓ Checked In' : 'Check In'}
          </button>
        </div>`;
    }).join('');
  }

  async function clearAll() {
    if (!confirm('Permanently delete all guest records from Google Sheets? This cannot be undone.')) return;
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'clearAll' })
      });
      guests = [];
      render(); updateStats();
    } catch(e) { alert('Failed to clear records. Please try again.'); }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
